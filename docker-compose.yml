x-db-config: &db-config
  DB_SERVER: sqlserver
  DB_NAME: ForensicAccounting
  DB_USERNAME: sa
  DB_PASSWORD: "FAd3mo#2025!"

services:
  sqlserver:
    build:
      context: ./code/sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "FAd3mo#2025!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  jupyter:
    build:
      context: ./code/python
    environment:
      <<: *db-config
    ports:
      - "8888:8888"
    depends_on:
      sqlserver:
        condition: service_healthy
